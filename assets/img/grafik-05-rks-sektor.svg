<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="auto">
  <defs>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00838F"/>
      <stop offset="100%" stop-color="#26C6DA"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#FFA726"/>
    </linearGradient>
    <linearGradient id="bar5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6A1B9A"/>
      <stop offset="100%" stop-color="#AB47BC"/>
    </linearGradient>
    <linearGradient id="bar6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="100%" stop-color="#78909C"/>
    </linearGradient>
    <linearGradient id="bar7" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#004D40"/>
      <stop offset="100%" stop-color="#4DB6AC"/>
    </linearGradient>
    <linearGradient id="bar8" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B71C1C"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#FAFAFA" rx="8"/>
  <rect x="0" y="0" width="800" height="6" fill="#D32F2F" rx="3"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#212121">Rasio Kebutuhan Sektoral (RKS) per Sektor</text>
  <line x1="280" y1="54" x2="520" y2="54" stroke="#D32F2F" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Legend -->
  <rect x="580" y="18" width="12" height="12" rx="2" fill="url(#bar8)"/>
  <text x="596" y="28" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#555">Prioritas Tertinggi</text>

  <!-- Y-axis label -->
  <text x="20" y="280" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#757575" transform="rotate(-90, 20, 280)">Sektor</text>

  <!-- Grid lines -->
  <line x1="220" y1="80" x2="220" y2="460" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="220" y1="80" x2="760" y2="80" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="220" y1="190" x2="760" y2="190" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="220" y1="300" x2="760" y2="300" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="220" y1="410" x2="760" y2="410" stroke="#E0E0E0" stroke-width="0.5"/>

  <!-- Scale markers -->
  <text x="218" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#9E9E9E">0%</text>
  <text x="355" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#9E9E9E">25%</text>
  <text x="490" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#9E9E9E">50%</text>
  <text x="625" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#9E9E9E">75%</text>
  <text x="760" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#9E9E9E">100%</text>

  <!-- Bars and labels -->
  <!-- Bar 1: Kesehatan - 92% -->
  <rect x="80" y="85" width="120" height="22" rx="4" fill="#1565C0"/>
  <text x="200" y="100" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#333">Kesehatan</text>
  <rect x="220" y="85" width="497" height="22" rx="4" fill="url(#bar1)" filter="url(#shadow)"/>
  <text x="730" y="100" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#333" font-weight="bold">92%</text>

  <!-- Bar 2: Air Bersih - 85% -->
  <rect x="80" y="115" width="120" height="22" rx="4" fill="#00838F"/>
  <text x="200" y="130" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#333">Air Bersih</text>
  <rect x="220" y="115" width="459" height="22" rx="4" fill="url(#bar2)" filter="url(#shadow)"/>
  <text x="690" y="130" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#333" font-weight="bold">85%</text>

  <!-- Bar 3: Sanitasi - 78% -->
  <rect x="80" y="145" width="120" height="22" rx="4" fill="#2E7D32"/>
  <text x="200" y="160" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#333">Sanitasi</text>
  <rect x="220" y="145" width="421" height="22" rx="4" fill="url(#bar3)" filter="url(#shadow)"/>
  <text x="652" y="160" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#333" font-weight="bold">78%</text>

  <!-- Bar 4: Pangan - 88% -->
  <rect x="80" y="175" width="120" height="22" rx="4" fill="#E65100"/>
  <text x="200" y="190" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#333">Pangan</text>
  <rect x="220" y="175" width="475" height="22" rx="4" fill="url(#bar4)" filter="url(#shadow)"/>
  <text x="706" y="190" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#333" font-weight="bold">88%</text>

  <!-- Bar 5: Shelter - 70% -->
  <rect x="80" y="205" width="120" height="22" rx="4" fill="#6A1B9A"/>
  <text x="200" y="220" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#333">Shelter</text>
  <rect x="220" y="205" width="378" height="22" rx="4" fill="url(#bar5)" filter="url(#shadow)"/>
  <text x="609" y="220" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#333" font-weight="bold">70%</text>

  <!-- Bar 6: Logistik - 95% -->
  <rect x="80" y="235" width="120" height="22" rx="4" fill="#37474F"/>
  <text x="200" y="250" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#333">Logistik</text>
  <rect x="220" y="235" width="513" height="22" rx="4" fill="url(#bar6)" filter="url(#shadow)"/>
  <text x="744" y="250" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#333" font-weight="bold">95%</text>

  <!-- Bar 7: Pendidikan - 62% -->
  <rect x="80" y="265" width="120" height="22" rx="4" fill="#004D40"/>
  <text x="200" y="280" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#333">Pendidikan</text>
  <rect x="220" y="265" width="335" height="22" rx="4" fill="url(#bar7)" filter="url(#shadow)"/>
  <text x="566" y="280" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#333" font-weight="bold">62%</text>

  <!-- Bar 8: Perlindungan - 80% -->
  <rect x="80" y="295" width="120" height="22" rx="4" fill="#B71C1C"/>
  <text x="200" y="310" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#333">Perlindungan</text>
  <rect x="220" y="295" width="432" height="22" rx="4" fill="url(#bar8)" filter="url(#shadow)"/>
  <text x="663" y="310" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#333" font-weight="bold">80%</text>

  <!-- Average line -->
  <line x1="220" y1="340" x2="760" y2="340" stroke="#D32F2F" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="760" y="334" width="30" height="14" rx="3" fill="#D32F2F"/>
  <text x="775" y="344" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#FFF">Rata-rata</text>

  <!-- Source note -->
  <text x="400" y="490" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#BDBDBD">Sumber: Hasil Assesment Cepat Terpadu (ACT) - PMI</text>
</svg>
