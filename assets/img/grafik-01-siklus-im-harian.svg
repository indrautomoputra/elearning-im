<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="auto">
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D32F2F"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#333">Siklus Informasi Manajemen Harian</text>
  <line x1="180" y1="52" x2="620" y2="52" stroke="#D32F2F" stroke-width="2"/>

  <!-- Center hub -->
  <circle cx="400" cy="270" r="32" fill="#D32F2F" opacity="0.1"/>
  <circle cx="400" cy="270" r="18" fill="#D32F2F" opacity="0.3"/>
  <circle cx="400" cy="270" r="8" fill="#D32F2F"/>

  <!-- Node positions: top, right, bottom, left -->
  <!-- Box 1: Pagi - Top -->
  <rect x="290" y="90" width="220" height="70" rx="8" fill="#fff" stroke="#D32F2F" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="116" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#D32F2F">PAGI</text>
  <text x="400" y="138" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#333">Kumpulkan Data</text>

  <!-- Box 2: Siang - Right -->
  <rect x="530" y="220" width="220" height="70" rx="8" fill="#fff" stroke="#D32F2F" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="246" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#D32F2F">SIANG</text>
  <text x="640" y="268" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#333">Olah Data</text>

  <!-- Box 3: Sore - Bottom -->
  <rect x="290" y="340" width="220" height="70" rx="8" fill="#fff" stroke="#D32F2F" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="366" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#D32F2F">SORE</text>
  <text x="400" y="388" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#333">Laporkan</text>

  <!-- Box 4: Malam - Left -->
  <rect x="50" y="220" width="220" height="70" rx="8" fill="#fff" stroke="#D32F2F" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="246" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#D32F2F">MALAM</text>
  <text x="160" y="268" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#333">Backup &amp; Siapkan</text>

  <!-- Arrows (curved) -->
  <!-- Pagi → Siang (top-right) -->
  <path d="M 505 140 Q 570 160 555 215" fill="none" stroke="#D32F2F" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- Siang → Sore (right-bottom) -->
  <path d="M 640 290 Q 640 310 515 355" fill="none" stroke="#D32F2F" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- Sore → Malam (bottom-left) -->
  <path d="M 295 355 Q 230 330 245 295" fill="none" stroke="#D32F2F" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- Malam → Pagi (left-top) -->
  <path d="M 160 220 Q 160 195 285 150" fill="none" stroke="#D32F2F" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- Footer -->
  <text x="400" y="480" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#888">Siklus IM Harian — Palang Merah Indonesia</text>
</svg>
