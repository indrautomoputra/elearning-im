<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="auto">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="red-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#333">Tiga Pilar Analisis Informasi Manajemen</text>
  <line x1="160" y1="52" x2="640" y2="52" stroke="#D32F2F" stroke-width="2"/>

  <!-- Column widths: 220px, gaps: 35px → (220*3 + 35*2) = 730, centered -->
  <!-- Col 1: x=35, Col 2: x=290, Col 3: x=545 -->

  <!-- Pillar 1 -->
  <rect x="35" y="75" width="220" height="375" rx="10" fill="#fff" stroke="#D32F2F" stroke-width="2" filter="url(#shadow)"/>
  <rect x="35" y="75" width="220" height="55" rx="10" fill="url(#red-grad)"/>
  <rect x="35" y="120" width="220" height="10" fill="url(#red-grad)"/>
  <text x="145" y="98" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#fff">PILAR 1</text>
  <text x="145" y="116" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#fff">Analisis Situasi</text>

  <!-- Pillar 1 content -->
  <rect x="50" y="145" width="190" height="36" rx="6" fill="#FFEBEE"/>
  <text x="145" y="168" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#D32F2F">Apa yang terjadi?</text>

  <text x="145" y="206" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">Data Bencana</text>
  <line x1="75" y1="216" x2="215" y2="216" stroke="#eee" stroke-width="1"/>
  <text x="145" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Jenis &amp; skala</text>
  <text x="145" y="258" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Lokasi &amp; waktu</text>
  <text x="145" y="276" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Dampak fisik</text>

  <text x="145" y="310" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">Data Populasi</text>
  <line x1="75" y1="320" x2="215" y2="320" stroke="#eee" stroke-width="1"/>
  <text x="145" y="344" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Jiwa terdampak</text>
  <text x="145" y="362" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Demografi</text>
  <text x="145" y="380" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Kerentanan</text>

  <text x="145" y="414" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">Data Akses</text>
  <line x1="75" y1="424" x2="215" y2="424" stroke="#eee" stroke-width="1"/>
  <text x="145" y="444" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Jangkauan</text>

  <!-- Pillar 2 -->
  <rect x="290" y="75" width="220" height="375" rx="10" fill="#fff" stroke="#D32F2F" stroke-width="2" filter="url(#shadow)"/>
  <rect x="290" y="75" width="220" height="55" rx="10" fill="url(#red-grad)"/>
  <rect x="290" y="120" width="220" height="10" fill="url(#red-grad)"/>
  <text x="400" y="98" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#fff">PILAR 2</text>
  <text x="400" y="116" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#fff">Analisis Kapasitas</text>

  <!-- Pillar 2 content -->
  <rect x="305" y="145" width="190" height="36" rx="6" fill="#FFEBEE"/>
  <text x="400" y="168" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#D32F2F">Apa yang sudah dilakukan?</text>

  <text x="400" y="206" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">Data Respons</text>
  <line x1="330" y1="216" x2="470" y2="216" stroke="#eee" stroke-width="1"/>
  <text x="400" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Aksi terkini</text>
  <text x="400" y="258" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Cakupan</text>
  <text x="400" y="276" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Target vs realisasi</text>

  <text x="400" y="310" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">Data Sumber Daya</text>
  <line x1="330" y1="320" x2="470" y2="320" stroke="#eee" stroke-width="1"/>
  <text x="400" y="344" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Personel</text>
  <text x="400" y="362" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Logistik</text>
  <text x="400" y="380" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Anggaran</text>

  <text x="400" y="414" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">Data Mitigasi</text>
  <line x1="330" y1="424" x2="470" y2="424" stroke="#eee" stroke-width="1"/>
  <text x="400" y="444" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Upaya pencegahan</text>

  <!-- Pillar 3 -->
  <rect x="545" y="75" width="220" height="375" rx="10" fill="#fff" stroke="#D32F2F" stroke-width="2" filter="url(#shadow)"/>
  <rect x="545" y="75" width="220" height="55" rx="10" fill="url(#red-grad)"/>
  <rect x="545" y="120" width="220" height="10" fill="url(#red-grad)"/>
  <text x="655" y="98" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#fff">PILAR 3</text>
  <text x="655" y="116" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#fff">Analisis Kesenjangan</text>

  <!-- Pillar 3 content -->
  <rect x="560" y="145" width="190" height="36" rx="6" fill="#FFEBEE"/>
  <text x="655" y="168" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#D32F2F">Apa yang kurang?</text>

  <text x="655" y="206" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">Identifikasi Gap</text>
  <line x1="585" y1="216" x2="725" y2="216" stroke="#eee" stroke-width="1"/>
  <text x="655" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Kebutuhan vs kapasitas</text>
  <text x="655" y="258" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Kekurangan SD</text>
  <text x="655" y="276" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Hambatan akses</text>

  <text x="655" y="310" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">Prioritas</text>
  <line x1="585" y1="320" x2="725" y2="320" stroke="#eee" stroke-width="1"/>
  <text x="655" y="344" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Urgensi</text>
  <text x="655" y="362" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Dampak</text>
  <text x="655" y="380" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Kelayakan</text>

  <text x="655" y="414" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">Rekomendasi</text>
  <line x1="585" y1="424" x2="725" y2="424" stroke="#eee" stroke-width="1"/>
  <text x="655" y="444" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">• Aksi prioritas</text>

  <!-- Footer -->
  <text x="400" y="485" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#888">Tiga Pilar Analisis IM — Palang Merah Indonesia (IFRC)</text>
</svg>
