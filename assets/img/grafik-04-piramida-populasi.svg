<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="auto">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="red-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFCDD2"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#333">Piramida Populasi — 5 Lapisan</text>
  <line x1="200" y1="52" x2="600" y2="52" stroke="#D32F2F" stroke-width="2"/>

  <!-- Pyramid: centered, top at y=90, bottom at y=440 -->
  <!-- Width at top: 160px (x=320 to x=480) -->
  <!-- Width at bottom: 640px (x=80 to x=720) -->
  <!-- Each section height: 70px -->

  <!-- Pyramid outline -->
  <polygon points="400,90 80,440 720,440" fill="#f5f5f5" stroke="#D32F2F" stroke-width="2"/>

  <!-- Helper: calculate x-coordinates at each level -->
  <!-- y=90: w=160 (x=320→480) -->
  <!-- y=160: w=376 (x=212→588) -->
  <!-- y=230: w=472 (x=164→636) -->
  <!-- y=300: w=568 (x=116→684) -->
  <!-- y=370: w=624 (x=88→712) -->
  <!-- y=440: w=640 (x=80→720) -->

  <!-- Level 1 (top) - Target Program -->
  <line x1="320" y1="90" x2="480" y2="90" stroke="#D32F2F" stroke-width="2"/>
  <polygon points="320,90 212,160 588,160 480,90" fill="#D32F2F" fill-opacity="0.85" stroke="#D32F2F" stroke-width="1.5"/>
  <rect x="330" y="105" width="220" height="40" rx="4" fill="#fff" opacity="0.85" filter="url(#shadow)"/>
  <text x="400" y="122" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#D32F2F">Level 1: Target Program</text>
  <text x="400" y="138" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#555">Populasi penerima langsung</text>

  <!-- Level 2 - People in Need -->
  <line x1="212" y1="160" x2="588" y2="160" stroke="#D32F2F" stroke-width="2"/>
  <polygon points="212,160 164,230 636,230 588,160" fill="#E53935" fill-opacity="0.75" stroke="#D32F2F" stroke-width="1.5"/>
  <rect x="270" y="178" width="260" height="40" rx="4" fill="#fff" opacity="0.85" filter="url(#shadow)"/>
  <text x="400" y="195" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#D32F2F">Level 2: People in Need</text>
  <text x="400" y="211" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#555">Populasi membutuhkan bantuan</text>

  <!-- Level 3 - Affected Population -->
  <line x1="164" y1="230" x2="636" y2="230" stroke="#D32F2F" stroke-width="2"/>
  <polygon points="164,230 116,300 684,300 636,230" fill="#EF5350" fill-opacity="0.65" stroke="#D32F2F" stroke-width="1.5"/>
  <rect x="240" y="248" width="320" height="40" rx="4" fill="#fff" opacity="0.85" filter="url(#shadow)"/>
  <text x="400" y="265" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#D32F2F">Level 3: Affected Population</text>
  <text x="400" y="281" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#555">Populasi terdampak bencana</text>

  <!-- Level 4 - Population at Risk -->
  <line x1="116" y1="300" x2="684" y2="300" stroke="#D32F2F" stroke-width="2"/>
  <polygon points="116,300 88,370 712,370 684,300" fill="#EF9A9A" fill-opacity="0.7" stroke="#D32F2F" stroke-width="1.5"/>
  <rect x="220" y="318" width="360" height="40" rx="4" fill="#fff" opacity="0.85" filter="url(#shadow)"/>
  <text x="400" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#D32F2F">Level 4: Population at Risk</text>
  <text x="400" y="351" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#555">Populasi berisiko terdampak</text>

  <!-- Level 5 (bottom) - Total Population -->
  <line x1="88" y1="370" x2="712" y2="370" stroke="#D32F2F" stroke-width="2"/>
  <polygon points="88,370 80,440 720,440 712,370" fill="#FFCDD2" fill-opacity="0.8" stroke="#D32F2F" stroke-width="1.5"/>
  <rect x="210" y="388" width="380" height="40" rx="4" fill="#fff" opacity="0.85" filter="url(#shadow)"/>
  <text x="400" y="405" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#D32F2F">Level 5: Total Populasi — Caseload</text>
  <text x="400" y="421" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#555">Seluruh populasi di wilayah bencana</text>

  <!-- Side labels (narrowing arrow) -->
  <text x="740" y="265" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#D32F2F">Semakin</text>
  <text x="740" y="280" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#D32F2F">sempit</text>
  <text x="740" y="295" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#D32F2F">⬆</text>

  <text x="740" y="400" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#D32F2F">Semakin</text>
  <text x="740" y="415" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#D32F2F">luas</text>
  <text x="740" y="430" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#D32F2F">⬇</text>

  <!-- Footer -->
  <text x="400" y="485" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#888">Piramida Populasi — Palang Merah Indonesia</text>
</svg>
