<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="auto">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowGlow" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#FAFAFA" rx="8"/>
  <rect x="0" y="0" width="800" height="6" fill="#D32F2F" rx="3"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#212121">Paket Data RenOps</text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#757575">5 Komponen Utama Rencana Operasi</text>
  <line x1="300" y1="62" x2="500" y2="62" stroke="#D32F2F" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Connection lines from center to outer nodes -->
  <!-- Center to Top -->
  <line x1="400" y1="250" x2="400" y2="120" stroke="#BDBDBD" stroke-width="2"/>
  <!-- Center to Top-Right -->
  <line x1="400" y1="250" x2="610" y2="160" stroke="#BDBDBD" stroke-width="2"/>
  <!-- Center to Bottom-Right -->
  <line x1="400" y1="250" x2="610" y2="340" stroke="#BDBDBD" stroke-width="2"/>
  <!-- Center to Bottom-Left -->
  <line x1="400" y1="250" x2="190" y2="340" stroke="#BDBDBD" stroke-width="2"/>
  <!-- Center to Top-Left -->
  <line x1="400" y1="250" x2="190" y2="160" stroke="#BDBDBD" stroke-width="2"/>

  <!-- Central Node -->
  <circle cx="400" cy="250" r="55" fill="#D32F2F" filter="url(#shadowGlow)"/>
  <circle cx="400" cy="250" r="55" fill="none" stroke="#B71C1C" stroke-width="2"/>
  <circle cx="400" cy="250" r="48" fill="none" stroke="#FFF" stroke-width="1" stroke-opacity="0.3"/>
  <text x="400" y="238" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#FFF">Paket Data</text>
  <text x="400" y="256" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#FFF">RenOps</text>

  <!-- Outer rings decorative -->
  <circle cx="400" cy="250" r="68" fill="none" stroke="#D32F2F" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="4,3"/>

  <!-- Component 1: Ringkasan Eksekutif (Top) -->
  <rect x="310" y="85" width="180" height="70" rx="10" fill="#FFF" stroke="#1565C0" stroke-width="2" filter="url(#shadow)"/>
  <rect x="310" y="85" width="180" height="6" rx="3" fill="#1565C0"/>
  <circle cx="330" cy="105" r="8" fill="#1565C0"/>
  <text x="330" y="109" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#FFF" font-weight="bold">1</text>
  <text x="400" y="115" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#1565C0">Ringkasan Eksekutif</text>
  <text x="400" y="133" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#616161">Gambaran situasi &amp;</text>
  <text x="400" y="147" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#616161">temuan utama</text>

  <!-- Component 2: Data Pendukung (Top-Right) -->
  <rect x="560" y="125" width="170" height="70" rx="10" fill="#FFF" stroke="#00838F" stroke-width="2" filter="url(#shadow)"/>
  <rect x="560" y="125" width="170" height="6" rx="3" fill="#00838F"/>
  <circle cx="580" cy="145" r="8" fill="#00838F"/>
  <text x="580" y="149" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#FFF" font-weight="bold">2</text>
  <text x="645" y="155" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#00838F">Data Pendukung</text>
  <text x="645" y="173" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#616161">Data mentah, statistik</text>
  <text x="645" y="187" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#616161">&amp; informasi lapangan</text>

  <!-- Component 3: Analisis & Produk IM (Bottom-Right) -->
  <rect x="560" y="305" width="170" height="70" rx="10" fill="#FFF" stroke="#E65100" stroke-width="2" filter="url(#shadow)"/>
  <rect x="560" y="305" width="170" height="6" rx="3" fill="#E65100"/>
  <circle cx="580" cy="325" r="8" fill="#E65100"/>
  <text x="580" y="329" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#FFF" font-weight="bold">3</text>
  <text x="645" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#E65100">Analisis &amp;</text>
  <text x="645" y="352" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#616161">Produk IM (peta, grafik,</text>
  <text x="645" y="366" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#616161">tabel, infografis)</text>

  <!-- Component 4: Matriks Prioritas (Bottom-Left) -->
  <rect x="70" y="305" width="190" height="70" rx="10" fill="#FFF" stroke="#2E7D32" stroke-width="2" filter="url(#shadow)"/>
  <rect x="70" y="305" width="190" height="6" rx="3" fill="#2E7D32"/>
  <circle cx="90" cy="325" r="8" fill="#2E7D32"/>
  <text x="90" y="329" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#FFF" font-weight="bold">4</text>
  <text x="165" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#2E7D32">Matriks Prioritas</text>
  <text x="165" y="353" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#616161">Urgensi vs Dampak</text>
  <text x="165" y="367" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#616161">prioritas sektor</text>

  <!-- Component 5: Rekomendasi (Top-Left) -->
  <rect x="70" y="125" width="190" height="70" rx="10" fill="#FFF" stroke="#6A1B9A" stroke-width="2" filter="url(#shadow)"/>
  <rect x="70" y="125" width="190" height="6" rx="3" fill="#6A1B9A"/>
  <circle cx="90" cy="145" r="8" fill="#6A1B9A"/>
  <text x="90" y="149" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#FFF" font-weight="bold">5</text>
  <text x="165" y="155" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#6A1B9A">Rekomendasi</text>
  <text x="165" y="173" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#616161">Tindakan, alokasi</text>
  <text x="165" y="187" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#616161">sumber daya &amp; timeline</text>

  <!-- Footer -->
  <text x="400" y="492" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#BDBDBD">Sumber: Standar Paket Data RenOps - PMI</text>
</svg>
